<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ án Responsive của Toàn</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="gallery-container">
        <figure>
            <img src="images/hinh1.jpg" alt="Hình chụp xe buýt VinBus chạy trên đường phố">
            <p>Chào mọi người, đây là trang web đồ án cuối khóa của mình. Mình rất thích tìm hiểu về hệ thống xe buýt công cộng và các giải pháp giao thông xanh hiện đại.</p>
        </figure>

        <figure>
            <img src="images/hinh2.jpg" alt="Hệ thống thanh toán UniPass bằng mã QR">
            <p>Trang web này sử dụng mô hình thiết kế Mobile-First, tự động tối ưu hóa bố cục từ màn hình điện thoại nhỏ gọn cho đến màn hình máy tính kích thước lớn.</p>
        </figure>

        <figure>
            <img src="images/hinh3.jpg" alt="Hình chụp phong cảnh thành phố Hồ Chí Minh buổi chiều tà">
            <p>Đặc biệt, website còn có khả năng tự động nhận diện và chuyển đổi giao diện sang Chế độ tối (Dark Mode) dựa trên cài đặt hệ điều hành của người dùng.</p>
        </figure>
    </main>

</body>
</html>
